name: Ejecutar Scraper Deportivo Dinamico

on:
  workflow_dispatch:
    inputs:
      id_equipo:
        description: 'ID del equipo de Sofascore'
        required: true
        default: '4820'

jobs:
  raspado:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python en el servidor
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalar dependencias necesarias
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium

    - name: Ejecutar el Scraper de Python
      run: |
        python scraper_aiscore.py "${{ github.event.inputs.id_equipo }}"

    # ← NUEVO (para depuración)
    - name: Verificar si se generó el JSON
      run: |
        echo "Directorio actual:"
        pwd

        echo "Archivos:"
        ls -lah

        if ls *.json 1> /dev/null 2>&1; then
          echo "JSON encontrado"
        else
          echo "ERROR: No se generó ningún JSON"
          exit 1
        fi

    - name: Guardar cambios y actualizar la web automaticamente
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"

        git add .

        if git diff --cached --quiet; then
          echo "No hay cambios para subir"
        else
          git commit -m "update: equipo ${{ github.event.inputs.id_equipo }}"
          git push
        fi
