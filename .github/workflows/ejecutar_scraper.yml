name: Ejecutar Scraper Deportivo Dinamico

on:
  workflow_dispatch:
    inputs:
      id_equipo:
        description: 'ID del equipo de Sofascore'
        required: true
        default: '4820'

jobs:
  raspado:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python en el servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias necesarias
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium

    - name: Ejecutar el Scraper de Python
      run: |
        python scraper_aiscore.py ${{ github.event.inputs.id_equipo }}

    - name: Guardar cambios y actualizar la web automaticamente
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.json
        # Solo hacemos commit si hay cambios reales
        if git diff --staged --quiet; then
          echo "No hay cambios nuevos"
        else
          git commit -m "update: datos del equipo ${{ github.event.inputs.id_equipo }}"
          git push
        fi
